{% extends "base.html" %}

{% block title %}Iniciar Sesión - Cuerpo de Bomberos{% endblock %}

{% block content %}
<div class="flex min-h-[75vh] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Logotipo animado o icono de fuego -->
        <div
            class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-tr from-fire-600 to-amber-500 shadow-xl shadow-fire-900/30">
            <i data-lucide="flame" class="h-10 w-10 text-white animate-pulse"></i>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold tracking-tight text-white">
            Cuerpo de Bomberos
        </h2>
        <p class="mt-2 text-center text-sm text-slate-400">
            Sistema de Reporte y Gestión de Actuaciones
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-panel py-8 px-4 shadow-2xl rounded-2xl sm:px-10 border border-slate-800">
            <form class="space-y-6" action="{{ url_for('auth.login') }}" method="POST">

                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-300">
                        Nombre de Usuario
                    </label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                            <i data-lucide="user" class="h-5 w-5 text-slate-500"></i>
                        </div>
                        <input id="username" name="username" type="text" required
                            class="block w-full rounded-xl border-slate-800 bg-slate-950/60 pl-10 pr-3 py-3 text-slate-200 placeholder-slate-500 focus:border-fire-500 focus:ring-fire-500 sm:text-sm border transition-all duration-200 focus:outline-none focus:ring-2"
                            placeholder="ej: jgonzalez">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-300">
                        Contraseña
                    </label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                            <i data-lucide="lock" class="h-5 w-5 text-slate-500"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                            class="block w-full rounded-xl border-slate-800 bg-slate-950/60 pl-10 pr-3 py-3 text-slate-200 placeholder-slate-500 focus:border-fire-500 focus:ring-fire-500 sm:text-sm border transition-all duration-200 focus:outline-none focus:ring-2"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember" name="remember" type="checkbox"
                            class="h-4 w-4 rounded border-slate-800 bg-slate-950 text-fire-600 focus:ring-fire-500">
                        <label for="remember" class="ml-2 block text-sm text-slate-400 cursor-pointer">
                            Recordarme
                        </label>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="flex w-full justify-center rounded-xl border border-transparent bg-gradient-to-r from-fire-600 to-fire-700 py-3 px-4 text-sm font-bold text-white shadow-lg hover:from-fire-500 hover:to-fire-600 focus:outline-none focus:ring-2 focus:ring-fire-500 focus:ring-offset-2 focus:ring-offset-slate-950 transition-all duration-200 transform hover:scale-[1.02] cursor-pointer">
                        Ingresar al Sistema
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
